external-dns:
  provider: pihole
  sources:
    - service
    - ingress
    - gateway-httproute
    - gateway-tcproute
  env:
    - name: EXTERNAL_DNS_PIHOLE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: pihole-admin-secret
          key: adminPassword
  extraArgs:
    - --pihole-server=http://pihole-web.pihole.svc.cluster.local
    - --pihole-api-version=6
    - --annotation-filter=external-dns.alpha.kubernetes.io/target notin (homelab-tunnel.lajas.tech)
  interval: 24h
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  registry: "noop"
