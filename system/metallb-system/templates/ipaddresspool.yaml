---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: dedicated-vips
  namespace: metallb-system
spec:
  # Dedicated per-service VIPs — autoAssign disabled so IPs are only used
  # when explicitly requested via spec.loadBalancerIP on a Service.
  autoAssign: false
  addresses:
    # Application VIPs
    - 10.137.0.227/32   # homebridge
    - 10.137.0.228/32   # plex (clusterplex)
    - 10.137.0.229/32   # lancache
    - 10.137.0.230/32   # lancache-dns
    - 10.137.0.231/32   # neko
    # Game server VIPs
    - 10.137.0.248/32   # minecraft
    - 10.137.0.249/32   # hermitcraft
    - 10.137.0.250/32   # hytale
    # Infrastructure VIPs
    - 10.137.0.253/32   # pihole
