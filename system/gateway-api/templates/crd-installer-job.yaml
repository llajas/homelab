apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-api-crd-installer
  namespace: kube-system
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    metadata:
      name: gateway-api-crd-installer
    spec:
      serviceAccountName: gateway-api-crd-installer
      restartPolicy: OnFailure
      containers:
      - name: install-crds
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Installing Gateway API CRDs {{ .Values.gateway_api_version }}..."
          kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ .Values.gateway_api_version }}/{{ .Values.gateway_api_channel }}-install.yaml
          echo "Gateway API CRDs installed successfully"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-api-crd-installer
  namespace: kube-system
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-api-crd-installer
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-api-crd-installer
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gateway-api-crd-installer
subjects:
- kind: ServiceAccount
  name: gateway-api-crd-installer
  namespace: kube-system
