external-dns:
  provider: pihole
  sources:
    - service
    - ingress
    - gateway-httproute
    - gateway-tcproute
  env:
    - name: EXTERNAL_DNS_PIHOLE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: pihole-admin-secret
          key: adminPassword
  extraArgs:
    - --pihole-server=http://10.0.0.3
    - --pihole-api-version=6
  interval: 24h
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  registry: "noop"
