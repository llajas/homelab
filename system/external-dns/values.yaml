external-dns:
  provider: cloudflare
  sources:
    - service
    - ingress
    - gateway-httproute  # Task 4: Gateway API support
    - gateway-tcproute   # Task 4: Gateway API support
  txtOwnerId: homelab
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: value
  extraArgs:
    - --annotation-filter=external-dns.alpha.kubernetes.io/exclude notin (true)
  interval: 5m
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
