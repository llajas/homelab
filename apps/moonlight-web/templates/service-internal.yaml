{{- if .Values.service.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moonlight-web.fullname" . }}
  namespace: {{ include "moonlight-web.namespace" . }}
  labels:
    {{- include "moonlight-web.labels" . | nindent 4 }}
    {{- with .Values.service.internal.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.internal.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.internal.type }}
  selector:
    {{- include "moonlight-web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.internal.port }}
      targetPort: 8080
      protocol: TCP
{{- end }}
