#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

controller:
  labels:
    nfs-dependent: "true"

image:
  # -- image repository
  repository: lancachenet/monolithic
  # -- image tag
  tag: latest
  # -- image pull policy
  pullPolicy: IfNotPresent

configmap:
  nginx-logging:
    enabled: true
    data:
      10_generic.conf: |
        # Primary monolithic cache engine

        server {
          listen 80 reuseport;
          listen [::]:80 reuseport;

          access_log /dev/stdout cachelog;
          error_log /dev/stderr;

          include /etc/nginx/sites-available/cache.conf.d/*.conf;
        }
      10_sni.conf: |
        server {
          listen 443;
          resolver 8.8.8.8 8.8.4.4 ipv6=off;
          proxy_pass $ssl_preread_server_name:443;
          ssl_preread on;

          access_log /dev/stdout stream_basic;
          error_log /dev/stderr;
        }
      20_upstream.conf: |
        # Upstream server to proxy and handle inconsistent 302 redirects
        # All cache traffic is passed through this proxy to allow rewriting of redirects without caching

        # This is particularly important for sony / ps5 as upstreams redirect between them which confuses slice map on caching

        server {

          # Internal bind on 3128, this should not be externally mapped
          listen localhost:3128 reuseport;

          # No access_log tracking as all requests to this instance are already logged through monolithic

          # access_log /dev/stdout cachelog;
          error_log /dev/stderr;

          include /etc/nginx/sites-available/upstream.conf.d/*.conf;
        }

# -- environment variables. See more environment variables in the [LanCache Monolithic documentation](https://lancache.net/docs/containers/monolithic/variables/).
# @default -- See below
env:
  # -- Set the container timezone
  TZ: America/Chicago
  # UPSTREAM_DNS:
  # CACHE_MEM_SIZE:
  # CACHE_DISK_SIZE:
  # CACHE_MAX_AGE:

# -- Configures service settings for the chart.
# @default -- See values.yaml
service:
  main:
    type: LoadBalancer
    loadBalancerClass: "metallb"
    loadBalancerIP: 10.137.0.229
    ports:
      http:
        port: 80
      https:
        enabled: true
        port: 443
  dns:
    enabled: true
    type: ClusterIP
    # NOTE: LoadBalancer IP (10.137.0.230) now managed by lancache-dns-forwarder (dnsdist)
    # which provides health-checking and automatic failover to Unbound when lancache is down
    ports:
      dns:
        port: 53

# -- LanCache uses custom upstream nameservers, overridable with the `UPSTREAM_DNS` variable.
dnsPolicy: None
dnsConfig:
  nameservers:
    - 10.137.0.253

dns:
  # -- Enable and configure LanCache DNS sidecar and service.
  # @default -- See values.yaml
  enabled: true
  gameServices:
    - steam
    - origin
    - uplay
    - battlenet
    - etc
  # -- environment variables. See more environment variables in the [LanCache DNS documentation](https://lancache.net/docs/containers/dns/variables/).
  # Most variables are inherited from the top-level `env`. `LANCACHE_IP` is auto-generated from the `loadBalancerIP` of the `main` service if specified.
  env: {}
  image:
    # -- image repository
    repository: lancachenet/lancache-dns
    # -- image tag
    tag: latest
    # -- image pull policy
    pullPolicy: IfNotPresent

probes:
  readiness:
    custom: true
    spec:
      httpGet:
        path: /lancache-heartbeat
        port: 80
  liveness:
    custom: true
    spec:
      httpGet:
        path: /lancache-heartbeat
        port: 80
  startup:
    custom: true
    spec:
      httpGet:
        path: /lancache-heartbeat
        port: 80

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  data:
    enabled: true
    existingClaim: lancache-data-cache-pvc
    mountPath: /data/cache
    accessMode: ReadWriteOnce
    storageClassName: nfs
    size: 1Ti
    nfs:
      path: /mnt/user/lancache
      server: nas-01.storage.lajas.tech
  logs:
    enabled: false
    mountPath: /data/logs
    accessMode: ReadWriteOnce
    size: 2Gi
  nginx-logging:
    enabled: true
    type: configMap
    name: '{{ include "common.names.fullname" . }}-nginx-logging'
    readOnly: true
    subPath:
      - path: 10_generic.conf
        mountPath: /etc/nginx/sites-enabled/10_generic.conf
      - path: 10_sni.conf
        mountPath: /etc/nginx/stream-enabled/10_sni.conf
      - path: 20_upstream.conf
        mountPath: /etc/nginx/sites-enabled/20_upstream.conf

# -- The official LanCache image is only available for x86_64.
nodeSelector:
  kubernetes.io/arch: amd64

# Access logs now go directly to stdout/stderr via the mounted nginx config overrides above,
# so no sidecar is needed to tail files into kubectl logs.
