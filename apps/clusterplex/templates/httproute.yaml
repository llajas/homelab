apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clusterplex-plex
  namespace: clusterplex
{{- $routeAnnotations := dict }}
{{- range $k, $v := .Values.pms.ingressConfig.annotations }}
{{- if not (hasPrefix "nginx.ingress.kubernetes.io/" $k) }}
{{- $_ := set $routeAnnotations $k $v }}
{{- end }}
{{- end }}
{{- if $routeAnnotations }}
  annotations:
{{ toYaml $routeAnnotations | indent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.pms.ingressConfig.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: clusterplex-pms
      port: 32400
      weight: 1
