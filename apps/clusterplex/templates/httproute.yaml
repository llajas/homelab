apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clusterplex-plex
  namespace: clusterplex
  annotations:
{{ toYaml .Values.pms.ingressConfig.annotations | indent 4 }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.pms.ingressConfig.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: clusterplex-pms
      port: 32400
