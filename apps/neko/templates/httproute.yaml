{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.httpRoute.annotations }}
  annotations:
{{ toYaml .Values.httpRoute.annotations | indent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ .Values.httpRoute.host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: neko-main
      port: 8080
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}-http-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: http
  hostnames:
  - {{ .Values.httpRoute.host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
{{- end }}
