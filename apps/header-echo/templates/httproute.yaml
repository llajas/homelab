{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.httpRoute.annotations }}
  annotations:
{{- toYaml .Values.httpRoute.annotations | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ .Values.httpRoute.host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "header-echo.fullname" . }}
      port: {{ .Values.service.port }}
      weight: 1
{{- end }}
