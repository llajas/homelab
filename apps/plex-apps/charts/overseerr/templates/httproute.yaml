apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: overseerr
  namespace: {{ .Release.Namespace }}
{{- $routeAnnotations := dict }}
{{- range $k, $v := .Values.ingress.main.annotations }}
{{- if not (hasPrefix "nginx.ingress.kubernetes.io/" $k) }}
{{- $_ := set $routeAnnotations $k $v }}
{{- end }}
{{- end }}
{{- if $routeAnnotations }}
  annotations:
{{ toYaml $routeAnnotations | indent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: public-gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.ingress.main.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "common.names.fullname" . }}
      port: {{ .Values.service.main.ports.http.port }}
