apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rdtclient
  namespace: plex-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    hajimari.io/appName: RDT-Client
    hajimari.io/icon: cloud-download
spec:
  parentRefs:
  - name: public-gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - rdclient.lajas.tech
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: rdtclient
      port: 6500
