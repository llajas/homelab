openspeedtest:
  ingress:
    enabled: false  # Migrated to Gateway API HTTPRoute
    # className: nginx  # Migrated to Gateway API
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: 50m
      cert-manager.io/cluster-issuer: letsencrypt-prod
      hajimari.io/appName: Speedtest
      hajimari.io/icon: speedometer
    hosts:
      - host: &host speedtest.lajas.tech
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: speedtest-tls-certificate
        hosts:
          - *host
