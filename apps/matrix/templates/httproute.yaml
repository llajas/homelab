apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-elementweb
  namespace: {{ .Release.Namespace }}
{{- $elementwebAnnotations := dict }}
{{- range $k, $v := .Values.elementweb.ingress.annotations }}
{{- if not (hasPrefix "nginx.ingress.kubernetes.io/" $k) }}
{{- $_ := set $elementwebAnnotations $k $v }}
{{- end }}
{{- end }}
{{- if $elementwebAnnotations }}
  annotations:
{{ toYaml $elementwebAnnotations | indent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.elementweb.ingress.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: matrix-elementweb
      port: 80
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
