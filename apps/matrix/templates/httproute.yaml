apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-elementweb
  namespace: {{ .Release.Namespace }}
  annotations:
{{ toYaml .Values.elementweb.ingress.annotations | indent 4 }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.elementweb.ingress.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: matrix-elementweb
      port: 80
      weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-monolith
  namespace: {{ .Release.Namespace }}
  annotations:
{{ toYaml .Values.dendrite.ingress.annotations | indent 4 }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.dendrite.ingress.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: monolith
      port: 8008
      weight: 1
