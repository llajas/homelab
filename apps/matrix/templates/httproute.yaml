apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix
  namespace: {{ .Release.Namespace }}
  annotations:
{{ toYaml .Values.elementweb.ingress.annotations | indent 4 }}
spec:
  parentRefs:
  - name: public-gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ (index .Values.elementweb.ingress.hosts 0).host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: matrix-elementweb
      port: 80
