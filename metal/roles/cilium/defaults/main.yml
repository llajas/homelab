cilium_repo_url: https://helm.cilium.io
cilium_version: 1.19.1
cilium_namespace: kube-system
cilium_values:
  operator:
    replicas: 1
  kubeProxyReplacement: true
  l2announcements:
    enabled: true  # Enabled with temporary LB pool
  bgpControlPlane:
    enabled: true  # Task 7: Enable BGP peering to UDM-Pro
  gatewayAPI:
    enabled: true  # Task 3: Gateway API support
    enableAppProtocol: true  # Required for WebSocket (kubernetes.io/ws) appProtocol support on backend Services
    enableAlpn: true  # Required for HTTP/2 ALPN negotiation on Gateway TLS listeners
  ingressController:
    enabled: false  # Retire the legacy shared cilium-ingress VIP; Gateway API remains enabled separately
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6444
  ipam:
    mode: cluster-pool
    operator:
      clusterPoolIPv4PodCIDRList:
        - 10.42.0.0/16  # Non-conflicting with infrastructure (10.0.0.0/24)
      clusterPoolIPv4MaskSize: 24
