---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeeringPolicy
metadata:
  name: cluster-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  virtualRouters:
  - localASN: 64513
    exportPodCIDR: false
    neighbors:
    - peerAddress: 10.137.0.1/32
      peerASN: 64512
    serviceSelector:
      matchExpressions:
      - key: io.cilium/bgp-announce
        operator: In
        values: ["true"]
