gitea:
  ingress:
    enabled: false
    # className: nginx  # Migrated to Gateway API
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      hajimari.io/appName: Gitea
      hajimari.io/icon: git
    hosts:
      - host: &host git.lajas.tech
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: gitea-tls-certificate
        hosts:
          - *host
  gitea:
    admin:
      existingSecret: gitea-admin-secret
    config:
      server:
        LANDING_PAGE: explore
        ROOT_URL: https://git.lajas.tech
      webhook:
        ALLOWED_HOST_LIST: private
  persistence:
    storageClass: longhorn
  postgresql:
    enabled: true
    image:
      tag: "16.6.0-debian-12-r2"
    persistence:
      storageClass: longhorn
  postgresql-ha:
    enabled: false
  valkey-cluster:
    cluster:
      nodes: 6
    persistence:
      size: 1Gi

sshLoadBalancer:
  enabled: true
  hostnames: git.lajas.tech
  ip: 10.137.0.226
  sharingKey: public-gateway
  sharingCrossNamespace: kube-system
