apiVersion: apps/v1
kind: Deployment
metadata:
  name: zerotier-router
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    app: zerotier-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zerotier-router
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zerotier-router
    spec:
      initContainers:
        - name: identity-init
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/zerotier-one/networks.d
              printf '%s' "$ZEROTIER_IDENTITY_PUBLIC" > /var/lib/zerotier-one/identity.public
              printf '%s' "$ZEROTIER_IDENTITY_SECRET" > /var/lib/zerotier-one/identity.secret
              touch /var/lib/zerotier-one/networks.d/${ZEROTIER_NETWORK_ID}.conf
          env:
            - name: ZEROTIER_NETWORK_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ZEROTIER_NETWORK_ID
            - name: ZEROTIER_IDENTITY_PUBLIC
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ZEROTIER_IDENTITY_PUBLIC
            - name: ZEROTIER_IDENTITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ZEROTIER_IDENTITY_SECRET
          volumeMounts:
            - name: zerotier-data
              mountPath: /var/lib/zerotier-one
      containers:
        - name: zerotier-router
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ZEROTIER_ONE_NETWORK_IDS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ZEROTIER_NETWORK_ID
            - name: ZEROTIER_ONE_LOCAL_PHYS
              value: {{ .Values.zerotier.localPhys }}
            - name: ZEROTIER_ONE_GATEWAY_MODE
              value: {{ .Values.zerotier.gatewayMode }}
            - name: ZEROTIER_ONE_USE_IPTABLES_NFT
              value: {{ .Values.zerotier.useIptablesNft | quote }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: zerotier-data
              mountPath: /var/lib/zerotier-one
      volumes:
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: zerotier-data
          persistentVolumeClaim:
            claimName: zerotier-data
