image:
  repository: zyclonite/zerotier
  tag: "1.16.1"
  pullPolicy: IfNotPresent

# Name of the secret created by Terraform (external/modules/zerotier/main.tf)
# Contains: ZEROTIER_NETWORK_ID, ZEROTIER_IDENTITY_PUBLIC, ZEROTIER_IDENTITY_SECRET
secretName: zerotier-router

zerotier:
  # Physical interface inside the pod facing the cluster network
  localPhys: ens3
  # inbound = ZeroTier clients can reach cluster services (not the reverse)
  gatewayMode: inbound
  # Fedora 39 nodes use nf_tables backend
  useIptablesNft: "true"

persistence:
  storageClass: longhorn
  size: 256Mi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
