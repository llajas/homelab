{{- if .Values.notifyWebhook.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "nas-dependency-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  annotations:
{{- with .Values.notifyWebhook.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: public-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    namespace: kube-system
    sectionName: https
  hostnames:
  - {{ .Values.notifyWebhook.ingress.host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "nas-dependency-operator.fullname" . }}-webhook
      port: 80
      weight: 1
{{- end }}
