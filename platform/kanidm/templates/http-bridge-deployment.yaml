apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanidm-http-bridge
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kanidm-http-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kanidm-http-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kanidm-http-bridge
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: kanidm-http-bridge
