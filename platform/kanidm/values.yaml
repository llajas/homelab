app-template:
  controllers:
    main:
      type: statefulset
      containers:
        main:
          image:
            repository: docker.io/kanidm/server
            tag: 1.7.4

          probes:
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  scheme: HTTPS
                  port: 443
                  path: /status
                  httpHeaders:
                    - name: Host
                      value: auth.lajas.tech
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
                successThreshold: 1

            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  scheme: HTTPS
                  port: 443
                  path: /status
                  httpHeaders:
                    - name: Host
                      value: auth.lajas.tech
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
                successThreshold: 1

            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  scheme: HTTPS
                  port: 443
                  path: /status
                  httpHeaders:
                    - name: Host
                      value: auth.lajas.tech
                periodSeconds: 5
                timeoutSeconds: 3
                # Give Kanidm plenty of time to come up on first boot/migrations
                failureThreshold: 60
                successThreshold: 1
      statefulset:
        volumeClaimTemplates:
          - name: data
            size: 1Gi
            globalMounts:
              - path: /data
            accessMode: "ReadWriteOnce"
  configMaps:
    config:
      enabled: true
      data:
        server.toml: |
          bindaddress = "[::]:443"
          ldapbindaddress = "[::]:636"
          trust_x_forward_for = true
          db_path = "/data/kanidm.db"
          tls_chain = "/data/ca.crt"
          tls_key = "/data/tls.key"
          domain = "auth.lajas.tech"
          origin = "https://auth.lajas.tech"
  service:
    main:
      ports:
        http:
          enabled: false
          port: 80
          protocol: HTTP
        https:
          enabled: true
          port: 443
          protocol: HTTPS
        ldap:
          port: 636
          protocol: TCP
  ingress:
    main:
      enabled: false  # Migrated to Gateway API HTTPRoute
  persistence:
    config:
      enabled: true
      type: configMap
      name: kanidm
      globalMounts:
        - path: /data/server.toml
          subPath: server.toml
    tls:
      enabled: true
      type: secret
      name: kanidm-selfsigned-certificate
      globalMounts:
        - path: /data/ca.crt
          subPath: ca.crt
        - path: /data/tls.key
          subPath: tls.key
